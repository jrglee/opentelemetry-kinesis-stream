# Producer collector: OTLP in, Kinesis out. Used by the E2E stack.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    # Force one span per exported batch -> one Kinesis record per span -> one
    # random partition key per span. send_batch_max_size is the lever that
    # actually splits a large incoming batch; send_batch_size alone only sets
    # the flush trigger and would emit all spans as a single record. Many keys
    # spread spans evenly across shards so the E2E reliably exercises both
    # shards (and both consumer replicas).
    timeout: 200ms
    send_batch_size: 1
    send_batch_max_size: 1

exporters:
  awskinesis:
    stream_name: otel-traces
    region: us-east-1
    endpoint: http://ministack:4566
    encoding: otlp_proto
    compression: gzip
    max_record_size: 1048576
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awskinesis, debug]
