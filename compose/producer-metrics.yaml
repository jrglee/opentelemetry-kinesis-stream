# Metrics producer collector: InfluxDB line protocol in, Kinesis out.
#
# InfluxDB tags arrive as datapoint attributes (not resource attributes).
# The exporter derives the partition key DIRECTLY from the datapoint:
#   - device_id  — a datapoint attribute set by the linegen tag (the InfluxDB
#                  receiver drops dotted tag keys, so this path uses device_id;
#                  a real OTLP producer would use device.id — the exporter reads
#                  whatever key the producer emits)
#   - subsystem  — extracted from the metric name via ^([a-z]+)_ regex
#                  and also PROMOTED onto each datapoint as attribute "subsystem"
#                  (only when absent, so the payload is otherwise unchanged)
#
# This replaces the previous groupbyattrs processor. Tags stay on the datapoint;
# no resource promotion occurs; the round-trip payload is unmodified.
receivers:
  influxdb:
    endpoint: 0.0.0.0:8086

exporters:
  awskinesis:
    stream_name: otel-metrics
    region: us-east-1
    endpoint: http://ministack:4566
    encoding: ${env:ENCODING:-otlp_proto}
    compression: ${env:COMPRESSION:-zstd}
    max_record_size: 1048576
    partition_key:
      strategy: tag_hash
      keys:
        - { source: datapoint, name: device_id }
        - { source: metric_name, regex: "^([a-z]+)_", promote: subsystem }
      hash: xxhash
    oversize:
      policies: [split_half]
      max_attempts: 8
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [influxdb]
      exporters: [awskinesis, debug]
