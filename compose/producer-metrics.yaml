# Metrics producer collector: InfluxDB line protocol in, Kinesis out.
#
# InfluxDB tags arrive as datapoint attributes. groupbyattrs PROMOTES the
# selected tag keys to resource attributes so the exporter's tag_hash
# partition key (which hashes resource attributes) co-locates every datapoint
# sharing the same (host, region) tuple onto one stable partition key. The
# groupbyattrs keys MUST match the exporter's partition_key.tags exactly.
receivers:
  influxdb:
    endpoint: 0.0.0.0:8086

processors:
  groupbyattrs:
    keys: [host, region]

exporters:
  awskinesis:
    stream_name: otel-metrics
    region: us-east-1
    endpoint: http://ministack:4566
    encoding: ${env:ENCODING:-otlp_proto}
    compression: ${env:COMPRESSION:-zstd}
    max_record_size: 1048576
    partition_key:
      strategy: tag_hash
      tags: [host, region]
      hash: xxhash
    oversize:
      policy: split_half
      max_attempts: 8
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [influxdb]
      processors: [groupbyattrs]
      exporters: [awskinesis, debug]
